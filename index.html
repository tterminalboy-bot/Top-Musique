<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicStats Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #020617; /* VRAI Bleu nuit très profond/sombre */
            color: #f8fafc;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Barre latérale */
        nav {
            width: 260px;
            background-color: #0b1329; /* Bleu nuit contrasté */
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-right: 1px solid #1e293b;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: #38bdf8;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 1rem;
            padding: 12px;
            border-radius: 10px;
            transition: 0.2s;
            cursor: pointer;
        }

        nav a:hover, nav a.active {
            color: #ffffff;
            background-color: #1e293b;
            font-weight: 600;
        }

        /* Zone principale */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .search-container {
            margin-bottom: 35px;
        }

        .search-bar {
            width: 100%;
            max-width: 600px;
            padding: 14px 24px;
            border-radius: 30px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            font-size: 1rem;
        }

        .search-bar:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.15);
        }

        .section-title {
            margin-bottom: 25px;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }

        /* Interface "Sélection Rapide" à la YT Music (Lignes horizontales) */
        .yt-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 40px;
        }

        .yt-row {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            background-color: #0f172a;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .yt-row:hover {
            background-color: #1e293b;
            border-color: #38bdf8;
        }

        .row-index {
            width: 40px;
            font-size: 1rem;
            color: #64748b;
            font-weight: bold;
        }

        .row-pochette {
            width: 48px;
            height: 48px;
            background-color: #334155;
            border-radius: 6px;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .row-details {
            flex: 1;
        }

        .row-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 2px;
        }

        .row-artist {
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .row-album {
            color: #64748b;
            font-size: 0.85rem;
            display: none;
        }

        @media (min-width: 1024px) {
            .row-album { display: block; width: 250px; }
        }

        /* Fenêtre de Statistiques */
        .stats-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #020617;
            padding: 40px;
            display: none;
            z-index: 10;
        }

        .back-btn {
            background: none;
            border: none;
            color: #38bdf8;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 40px;
        }

        .stats-content {
            display: flex;
            gap: 50px;
        }

        .stats-pochette {
            width: 280px;
            height: 280px;
            background-color: #1e293b;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .stats-info h2 { font-size: 2.8rem; margin-bottom: 8px; }
        .stats-info h3 { font-size: 1.6rem; color: #38bdf8; margin-bottom: 24px; font-weight: 400; }
        .stats-info p { color: #94a3b8; margin-bottom: 8px; font-size: 1.05rem; }

        .stats-box {
            background-color: #0b1329;
            padding: 20px 30px;
            border-radius: 14px;
            border: 1px solid #1e293b;
            margin-top: 30px;
        }

        .stats-number {
            font-size: 2rem;
            font-weight: bold;
            color: #10b981;
            margin-top: 5px;
        }

        /* Mode Mobile */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            nav {
                width: 100%;
                height: auto;
                flex-direction: row;
                padding: 10px;
                order: 2;
                border-right: none;
                border-top: 1px solid #1e293b;
            }
            .logo { display: none; }
            main { order: 1; padding: 20px; }
            .stats-content { flex-direction: column; align-items: center; text-align: center; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">📊 MusicStats</div>
        <a onclick="changeTab('accueil', this)" class="active">Accueil</a>
        <a onclick="changeTab('france', this)">Top 10 France</a>
        <a onclick="changeTab('monde', this)">Top Monde</a>
        <a onclick="changeTab('jeunes', this)">Top Jeunes</a>
    </nav>

    <main>
        <div class="search-container">
            <input type="text" id="searchBar" class="search-bar" placeholder="Rechercher un titre ou un groupe...">
        </div>

        <h2 class="section-title" id="sectionTitle">Sélection rapide</h2>
        <div class="yt-list" id="songsList"></div>

        <div class="stats-panel" id="statsPanel">
            <button class="back-btn" onclick="closeStats()">← Retour</button>
            <div class="stats-content">
                <div class="stats-pochette" id="statsPochette">🎵</div>
                <div class="stats-info">
                    <h2 id="statsTitle">Titre</h2>
                    <h3 id="statsArtist">Artiste</h3>
                    <p id="statsAlbum">Album</p>
                    <p id="statsDate">Date de sortie</p>
                    <div class="stats-box">
                        <p>Total des streams (API Live data)</p>
                        <div class="stats-number" id="statsStreams">0</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Structure de données compatible avec les requêtes d'API futures
        const database = {
            accueil: [
                { title: "Mon Amour", artist: "Slimane", album: "Chroniques d'un cupidon", date: "08/11/2023", emoji: "❤️", streams: "145M" },
                { title: "Creep", artist: "Radiohead", album: "Pablo Honey", date: "21/09/1992", emoji: "🎸", streams: "1.8B" },
                { title: "La Symphonie des éclairs", artist: "Zaho de Sagazan", album: "La Symphonie des éclairs", date: "31/03/2023", emoji: "⚡", streams: "62M" }
            ],
            france: [
                { title: "Mon Amour", artist: "Slimane", album: "Chroniques d'un cupidon", date: "08/11/2023", emoji: "❤️", streams: "145M" },
                { title: "La Symphonie des éclairs", artist: "Zaho de Sagazan", album: "La Symphonie des éclairs", date: "31/03/2023", emoji: "⚡", streams: "62M" }
            ],
            monde: [
                { title: "Creep", artist: "Radiohead", album: "Pablo Honey", date: "21/09/1992", emoji: "🎸", streams: "1.8B" }
            ],
            jeunes: [
                { title: "La Symphonie des éclairs", artist: "Zaho de Sagazan", album: "La Symphonie des éclairs", date: "31/03/2023", emoji: "⚡", streams: "62M" }
            ]
        };

        let currentTab = 'accueil';
        const songsList = document.getElementById('songsList');
        const searchBar = document.getElementById('searchBar');
        const statsPanel = document.getElementById('statsPanel');

        // --- CODE STRUCTURE API (À activer avec ton serveur Node.js) ---
        async function fetchLiveStats(songTitle, artistName) {
            // Exemple de fonction de récupération de données d'API
            // const response = await fetch(`https://api.spotify.com/v1/search?q=${songTitle}&type=track`, { headers: ... });
            // const data = await response.json();
            // return data.tracks.items[0];
        }

        function displaySongs(songs) {
            songsList.innerHTML = "";
            songs.forEach((song, index) => {
                const row = document.createElement('div');
                row.className = 'yt-row';
                row.onclick = () => showStats(song);
                row.innerHTML = `
                    <div class="row-index">${index + 1}</div>
                    <div class="row-pochette">${song.emoji}</div>
                    <div class="row-details">
                        <div class="row-title">${song.title}</div>
                        <div class="row-artist">${song.artist}</div>
                    </div>
                    <div class="row-album">${song.album}</div>
                `;
                songsList.appendChild(row);
            });
        }

        function changeTab(tabName, element) {
            currentTab = tabName;
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            element.classList.add('active');
            
            const titles = { accueil: "Sélection rapide", france: "Top 10 France", monde: "Top Monde", jeunes: "Top Jeunes" };
            document.getElementById('sectionTitle').innerText = titles[tabName];
            
            displaySongs(database[tabName]);
        }

        searchBar.addEventListener('input', (e) => {
            const searchString = e.target.value.toLowerCase();
            const allSongs = Object.values(database).flat();
            // Supprime les doublons pour la recherche globale
            const uniqueSongs = allSongs.filter((v,i,a)=>a.findIndex(v2=>(v2.title===v.title))===i);
            
            const filtered = uniqueSongs.filter(song => {
                return song.title.toLowerCase().includes(searchString) || song.artist.toLowerCase().includes(searchString);
            });
            document.getElementById('sectionTitle').innerText = "Résultats de recherche";
            displaySongs(filtered);
        });

        function showStats(song) {
            document.getElementById('statsTitle').innerText = song.title;
            document.getElementById('statsArtist').innerText = song.artist;
            document.getElementById('statsAlbum').innerText = "Album : " + song.album;
            document.getElementById('statsDate').innerText = "Date de sortie : " + song.date;
            document.getElementById('statsStreams').innerText = song.streams;
            document.getElementById('statsPochette').innerText = song.emoji;
            statsPanel.style.display = "block";
        }

        function closeStats() { statsPanel.style.display = "none"; }

        // Lancement
        displaySongs(database.accueil);
    </script>
</body>
</html>
