<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicStats Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #020617;
            color: #f8fafc;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        nav {
            width: 260px;
            background-color: #0b1329;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-right: 1px solid #1e293b;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: #38bdf8;
            margin-bottom: 30px;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 1rem;
            padding: 12px;
            border-radius: 10px;
            transition: 0.2s;
            cursor: pointer;
        }

        nav a:hover, nav a.active {
            color: #ffffff;
            background-color: #1e293b;
        }

        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .search-container { margin-bottom: 35px; }
        .search-bar {
            width: 100%;
            max-width: 600px;
            padding: 14px 24px;
            border-radius: 30px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            font-size: 1rem;
        }

        .section-title { margin-bottom: 25px; font-size: 1.5rem; }

        /* Style Sélection Rapide sans numéros */
        .yt-list { display: flex; flex-direction: column; gap: 8px; }
        .yt-row {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            background-color: #0f172a;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .yt-row:hover { background-color: #1e293b; }

        .row-pochette {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            margin-right: 16px;
            object-fit: cover;
            background-color: #1e293b;
        }

        .row-details { flex: 1; }
        .row-title { font-weight: 600; font-size: 1rem; }
        .row-artist { color: #94a3b8; font-size: 0.85rem; }

        /* Fenêtre de Statistiques */
        .stats-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #020617;
            padding: 40px;
            display: none;
            z-index: 10;
        }

        .back-btn {
            background: none;
            border: none;
            color: #38bdf8;
            font-size: 1.1rem;
            cursor: pointer;
            margin-bottom: 40px;
        }

        .stats-content { display: flex; gap: 50px; }
        .stats-pochette {
            width: 280px;
            height: 280px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .stats-info h2 { font-size: 2.8rem; margin-bottom: 8px; }
        .stats-info h3 { font-size: 1.6rem; color: #38bdf8; margin-bottom: 24px; font-weight: 400; }
        .stats-info p { color: #94a3b8; margin-bottom: 8px; }

        .stats-box {
            background-color: #0b1329;
            padding: 20px 30px;
            border-radius: 14px;
            border: 1px solid #1e293b;
            margin-top: 20px;
        }
        .stats-number { font-size: 2rem; font-weight: bold; color: #10b981; }

        /* Section Logos des plateformes */
        .platform-container {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        .platform-btn {
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            font-size: 0.9rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
        }
        .spotify-btn { background-color: #1DB954; }
        .apple-btn { background-color: #FC3C44; }
        .youtube-btn { background-color: #FF0000; }
        .platform-btn:hover { opacity: 0.8; transform: scale(1.05); }

    </style>
</head>
<body>

    <nav>
        <div class="logo">📊 MusicStats</div>
        <a onclick="changeTab('accueil', this)" class="active">Accueil</a>
        <a onclick="changeTab('france', this)">Top 10 France</a>
        <a onclick="changeTab('monde', this)">Top Monde</a>
    </nav>

    <main>
        <div class="search-container">
            <input type="text" id="searchBar" class="search-bar" placeholder="Rechercher sur le catalogue mondial...">
        </div>

        <h2 class="section-title" id="sectionTitle">Sélection rapide</h2>
        <div class="yt-list" id="songsList"></div>

        <div class="stats-panel" id="statsPanel">
            <button class="back-btn" onclick="closeStats()">← Retour</button>
            <div class="stats-content">
                <img class="stats-pochette" id="statsPochette" src="" alt="Pochette">
                <div class="stats-info">
                    <h2 id="statsTitle">Titre</h2>
                    <h3 id="statsArtist">Artiste</h3>
                    <p id="statsAlbum">Album</p>
                    <p id="statsDate">Date de sortie</p>
                    <div class="stats-box">
                        <p>Total des streams cumulés</p>
                        <div class="stats-number" id="statsStreams">0</div>
                    </div>
                    
                    <div class="platform-container">
                        <a id="linkSpotify" class="platform-btn spotify-btn" target="_blank">🟢 Spotify</a>
                        <a id="linkApple" class="platform-btn apple-btn" target="_blank">🍎 Apple Music</a>
                        <a id="linkYoutube" class="platform-btn youtube-btn" target="_blank">🔴 YT Music</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const songsList = document.getElementById('songsList');
        const searchBar = document.getElementById('searchBar');
        const statsPanel = document.getElementById('statsPanel');
        const SERVER_URL = "http://localhost:3000/api/search";

        async function searchMusic(query = '') {
            try {
                const response = await fetch(`${SERVER_URL}?q=${query}`);
                const data = await response.json();
                displaySongs(data);
            } catch (error) {
                // Fallback avec les vraies images si le serveur Node n'est pas encore actif
                displaySongs([
                    { title: "Mon Amour", artist: "Slimane", album: "Chroniques d'un cupidon", date: "08/11/2023", image: "https://i.scdn.co/image/ab67616d0000b273b5089f24b2b2b1eb96d4ea2d", streams: "145M+", links: { spotify: "https://open.spotify.com/track/5X97Fh8c3G1VscX8Zt0C3G", apple: "#", youtube: "#" } },
                    { title: "Creep", artist: "Radiohead", album: "Pablo Honey", date: "21/09/1992", image: "https://i.scdn.co/image/ab67616d0000b27393cb17da2e6b21ba3778a846", streams: "1.8B+", links: { spotify: "https://open.spotify.com/track/7spvFS76Z707vAsG709wOf", apple: "#", youtube: "#" } },
                    { title: "La Symphonie des éclairs", artist: "Zaho de Sagazan", album: "La Symphonie des éclairs", date: "31/03/2023", image: "https://i.scdn.co/image/ab67616d0000b273e9702a0a2dfcb056df60341b", streams: "62M+", links: { spotify: "https://open.spotify.com/track/3n7N7M0xZt9B10ZUpA7zHk", apple: "#", youtube: "#" } }
                ]);
            }
        }

        function displaySongs(songs) {
            songsList.innerHTML = "";
            songs.forEach((song) => {
                const row = document.createElement('div');
                row.className = 'yt-row';
                row.onclick = () => showStats(song);
                row.innerHTML = `
                    <img class="row-pochette" src="${song.image}" alt="Pochette">
                    <div class="row-details">
                        <div class="row-title">${song.title}</div>
                        <div class="row-artist">${song.artist}</div>
                    </div>
                `;
                songsList.appendChild(row);
            });
        }

        searchBar.addEventListener('input', (e) => {
            searchMusic(e.target.value);
        });

        function showStats(song) {
            document.getElementById('statsTitle').innerText = song.title;
            document.getElementById('statsArtist').innerText = song.artist;
            document.getElementById('statsAlbum').innerText = "Album : " + song.album;
            document.getElementById('statsDate').innerText = "Date de sortie : " + song.date;
            document.getElementById('statsStreams').innerText = song.streams;
            document.getElementById('statsPochette').src = song.image;
            
            // Liens vers les plateformes
            document.getElementById('linkSpotify').href = song.links.spotify;
            document.getElementById('linkApple').href = song.links.apple;
            document.getElementById('linkYoutube').href = song.links.youtube;

            statsPanel.style.display = "block";
        }

        function closeStats() { statsPanel.style.display = "none"; }
        function changeTab(tabName, element) {
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            element.classList.add('active');
            searchMusic('');
        }

        searchMusic('');
    </script>
</body>
</html>
