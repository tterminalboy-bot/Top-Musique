<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicStats Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #030303;
            color: #ffffff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Barre latérale (Menu) */
        nav {
            width: 240px;
            background-color: #0f0f0f;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff0000; /* Style un peu YT Music */
            margin-bottom: 20px;
        }

        nav a {
            color: #aaaaaa;
            text-decoration: none;
            font-size: 1.1rem;
            padding: 10px;
            border-radius: 8px;
            transition: 0.2s;
        }

        nav a:hover, nav a.active {
            color: #ffffff;
            background-color: #272727;
        }

        /* Zone principale */
        main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        /* Barre de recherche */
        .search-container {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        .search-bar {
            width: 100%;
            max-width: 600px;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #272727;
            background-color: #212121;
            color: white;
            font-size: 1rem;
        }

        .search-bar:focus {
            outline: none;
            border-color: #ff0000;
        }

        /* Grille des Tops */
        .section-title {
            margin-bottom: 20px;
            font-size: 1.6rem;
        }

        .grid-songs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .song-card {
            background-color: #161616;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .song-card:hover {
            background-color: #212121;
            transform: translateY(-5px);
        }

        .pochette-demo {
            width: 100%;
            aspect-ratio: 1/1;
            background-color: #333;
            border-radius: 6px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #666;
        }

        .song-title {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            color: #aaa;
            font-size: 0.9rem;
        }

        /* Responsive Téléphone */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            nav {
                width: 100%;
                height: auto;
                flex-direction: row;
                justify-content: space-around;
                padding: 10px;
                order: 2; /* Met le menu en bas sur téléphone comme les app mobiles */
            }
            .logo {
                display: none;
            }
            main {
                order: 1;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MusicStats 📊</div>
        <a href="#" class="active">Accueil</a>
        <a href="#">Top 10 France</a>
        <a href="#">Top Monde</a>
        <a href="#">Top Jeunes</a>
    </nav>

    <main>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Rechercher une chanson, un groupe, un album...">
        </div>

        <h2 class="section-title">Top 10 France du moment</h2>
        <div class="grid-songs">
            <div class="song-card" onclick="alert('Ici s\'ouvriront les stats (Écoutes, historique des pochettes...) !')">
                <div class="pochette-demo">Pochette</div>
                <div class="song-title">Chanson Exemple 1</div>
                <div class="song-artist">Artiste Fr</div>
            </div>
            <div class="song-card">
                <div class="pochette-demo">Pochette</div>
                <div class="song-title">Chanson Exemple 2</div>
                <div class="song-artist">Artiste 2</div>
            </div>
            <div class="song-card">
                <div class="pochette-demo">Pochette</div>
                <div class="song-title">Chanson Exemple 3</div>
                <div class="song-artist">Artiste 3</div>
            </div>
        </div>
    </main>

</body>
</html>
